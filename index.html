<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Oasis Puro</title>

<meta name="theme-color" content="#0f172a" />
<meta name="description" content="Aplicación administrativa para ventas de agua, hielo, garrafones, pedidos, gastos e inventario." />

<!-- PWA -->
<link rel="manifest" href="./pwa/manifest.json" />

<!-- Logo / Icono -->
<link rel="icon" href="./assets/logo-oasis-puro.png" />

<!-- Tailwind CDN -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Supabase CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- CSS propio -->
<link rel="stylesheet" href="./css/styles.css" />

<meta name="theme-color" content="#0ea5e9">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Oasis Puro">

<link rel="icon" href="./assets/logo-oasis-puro.png">
<link rel="apple-touch-icon" href="./assets/logo-oasis-puro.png">

</head>

<body class="bg-slate-100 text-slate-900 dark:bg-slate-950 dark:text-slate-100 min-h-screen">

<main id="app" class="min-h-screen">
<section class="min-h-screen flex items-center justify-center px-4">
<div class="w-full max-w-md bg-white dark:bg-slate-900 rounded-3xl shadow-xl border border-slate-200 dark:border-slate-800 p-6">

<div class="flex flex-col items-center text-center mb-6">
<img
src="./assets/logo-oasis-puro.png"
alt="Oasis Puro Logo"
class="w-20 h-20 object-contain mb-3"
onerror="this.style.display='none'"
/>

<h1 class="text-3xl font-bold tracking-tight">
Oasis Puro
</h1>

<p class="text-sm text-slate-500 dark:text-slate-400 mt-2">
Administración de pedidos, ventas, gastos e inventario.
</p>
</div>

<div class="space-y-4">
<button
id="btn-login-view"
class="w-full bg-sky-600 hover:bg-sky-500 active:scale-[0.99] transition rounded-2xl py-3 font-semibold text-white"
>
Iniciar sesión
</button>

<button
id="btn-register-view"
class="w-full bg-slate-900 hover:bg-slate-800 dark:bg-slate-100 dark:hover:bg-white active:scale-[0.99] transition rounded-2xl py-3 font-semibold text-white dark:text-slate-900"
>
Crear cuenta administrador
</button>

<button
id="theme-toggle"
class="w-full border border-slate-300 dark:border-slate-700 rounded-2xl py-3 font-semibold text-slate-700 dark:text-slate-200"
>
Cambiar tema
</button>
</div>

<p class="text-center text-xs text-slate-400 mt-6">
AquaControl · Versión inicial
</p>
</div>
</section>
</main>

<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>

<script type="module" src="./js/app.js"></script>

<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker
        .register("./service-worker.js")
        .then(() => console.log("Service Worker registrado"))
        .catch((error) => console.error("Error Service Worker:", error));
    });
  }
</script>

<button
id="install-app"
style="
display:none;
position:fixed;
bottom:90px;
right:20px;
z-index:9999;
padding:12px 18px;
border:none;
border-radius:20px;
background:#0ea5e9;
color:white;
font-weight:700;
">
📲 Instalar App
</button>

<script>
let deferredPrompt;

window.addEventListener(
"beforeinstallprompt",
(e)=>{

e.preventDefault();

deferredPrompt=e;

document
.getElementById("install-app")
.style.display="block";

});

document
.getElementById("install-app")
.addEventListener(
"click",
async()=>{

if(!deferredPrompt)return;

deferredPrompt.prompt();

await deferredPrompt.userChoice;

deferredPrompt=null;

});
</script>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/exceljs/dist/exceljs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/file-saver/dist/FileSaver.min.js"></script>

</body>
</html>
